aid: hootsuite
name: Hootsuite
description: >-
  Hootsuite is a social media management platform that lets organizations
  schedule posts, monitor conversations, run paid campaigns, and analyze
  performance across LinkedIn, X (Twitter), Facebook, Instagram, TikTok,
  YouTube, and Pinterest from a single dashboard. The platform serves
  marketers, agencies, and enterprises with collaboration, approval, and
  governance workflows. The Hootsuite REST API uses OAuth 2.0 and provides
  programmatic access to social profiles, messages, scheduling, and
  analytics through the platform.hootsuite.com endpoint.
