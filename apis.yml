apis:
  - aid: hootsuite:rest-api
    name: Hootsuite REST API
    description: >-
      REST API for managing social media profiles, scheduling messages,
      reading and posting to connected networks, and pulling analytics
      across Hootsuite-managed accounts. Authentication uses OAuth 2.0
      authorization code flow with refresh-token support.
    humanURL: https://developer.hootsuite.com/docs/api
    baseURL: https://platform.hootsuite.com/v1
    tags:
